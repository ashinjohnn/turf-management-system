<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="C:\xampp\htdocs\TurfTrack\style.css" />
    <link rel="icon" href="C:\xampp\htdocs\TurfTrack\images\icon.png" type="image/x-icon">
    <link
      rel="stylesheet"
      href="C:\xampp\htdocs\TurfTrack\CommonFiles\bootstap.css"
    />
  </head>
  <body>
    <header>
      <div class="nav-left">
        <div class="logo">
          <img
            src="C:\xampp\htdocs\TurfTrack\images\logo.png"
            alt="Logo"
            width="50"
          />
        </div>
        <div class="website-name">Turf Track</div>
      </div>
      <nav class="nav-menu">
        <ul>
          <li class="nav-item">
            <a class="nav-link" href="C:\xampp\htdocs\TurfTrack\homepg.html"
              >Home</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="h-100 bg-white">
        <div class="container py-5 h-100">
          <div
            class="row d-flex justify-content-center align-items-center h-100"
          >
            <div class="col">
              <div class="card card-registration my-4">
                <div class="row g-0">
                  <div class="col-xl-6 d-none d-xl-block">
                    <img
                      src="C:\xampp\htdocs\TurfTrack\images\regpgimg.jpeg"
                      alt="Sample photo"
                      class="img-fluid"
                      style="
                        border-top-left-radius: 0.25rem;
                        border-bottom-left-radius: 0.25rem;
                      "
                    />
                  </div>
                  <div class="col-xl-6">
                    <div class="card-body p-md-5 text-black">
                      <h3 class="mb-5 text-uppercase">Create New Account</h3>

                      <div class="form-outline mb-4">
                        <label class="form-label" for="form3Example9"
                          >Name&nbsp;<span class="required">*</span></label
                        >
                        <input
                          type="text"
                          id="name"
                          class="form-control form-control-lg"
                        />
                      </div>

                      <div class="form-outline mb-4">
                        <label class="form-label" for="form3Example8"
                          >DOB&nbsp;<span class="required">*</span></label
                        >
                        <input
                          type="date"
                          id="DOB"
                          class="form-control form-control-lg"
                        />
                        
                      </div>

                      <div
                        class="d-md-flex justify-content-start align-items-center mb-4 py-2"
                      >
                        <!-- <h6 class="mb-0 me-4">Gender:</h6> -->
                        <label class="form-label me-4" for="form3Example8"
                          >Gender&nbsp;<span class="required">*</span></label>

                        <div class="form-check form-check-inline mb-0 mt-0 me-8">
                          <input
                            class="form-check-input"
                            type="radio"
                            name="inlineRadioOptions"
                            id="femaleGender"
                            value="option1"
                          />
                          <label class="form-check-label" for="femaleGender"
                            >Female</label
                          >
                        </div>

                        <div class="form-check form-check-inline mb-0 me-8">
                          <input
                            class="form-check-input"
                            type="radio"
                            name="inlineRadioOptions"
                            id="maleGender"
                            value="option2"
                          />
                          <label class="form-check-label" for="maleGender"
                            >Male</label
                          >
                        </div>

                        <div class="form-check form-check-inline mb-0">
                          <input
                            class="form-check-input"
                            type="radio"
                            name="inlineRadioOptions"
                            id="otherGender"
                            value="option3"
                          />
                          <label class="form-check-label" for="otherGender"
                            >Other</label
                          >
                        </div>
                      </div>

                      <div class="form-outline mb-4">
                        <label class="form-label" for="form3Example9"
                        >Address&nbsp;<span class="required">*</span></label
                      >
                        <input
                          type="text"
                          id="Address"
                          class="form-control form-control-lg"
                        />
                       
                      </div>

                      <div class="form-outline mb-4">
                        <label class="form-label" for="form3Example90"
                        >Phone no.&nbsp;<span class="required">*</span></label
                      >
                        <input
                          type="text"
                          id="phno"
                          class="form-control form-control-lg"
                        />
                       
                      </div>

                      <div class="form-outline mb-4">
                        <label class="form-label" for="form3Example99"
                          >Email ID&nbsp;<span class="required">*</span></label
                        >
                        <input
                          type="text"
                          id="emailid"
                          class="form-control form-control-lg"
                        />
                        
                      </div>

                      <div class="form-outline mb-4">
                        <label class="form-label" for="form3Example97"
                          >Password&nbsp;<span class="required">*</span></label
                        >
                        <input
                          type="password"
                          id="password"
                          class="form-control form-control-lg"
                        />
                        
                      </div>

                      <div class="d-flex justify-content-end pt-3">
                        <button
                          type="button"
                          class="btn btn-primary btn-lg ms-2 register"
                       
                        >
                          Register
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <p>&copy; 2023 Turf Track. All rights reserved.</p>
    </footer>
  </body>
</html>
